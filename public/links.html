    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; overflow-x: hidden; }
      body {
        font-family: 'Cairo', system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        color: #2a1830;
        background:
          radial-gradient(circle at 20% 0%, #ffd6e7 0%, transparent 45%),
          radial-gradient(circle at 80% 10%, #f6c6ff 0%, transparent 45%),
          radial-gradient(circle at 50% 100%, #ffe0b8 0%, transparent 50%),
          linear-gradient(160deg, #fbeaff 0%, #ffe6f0 50%, #fff3e0 100%);
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }

      .wrap {
        max-width: 440px;
        margin: 0 auto;
        padding: 28px 18px 36px;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
      }

      .card {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(22px) saturate(140%);
        -webkit-backdrop-filter: blur(22px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        padding: 26px 20px 24px;
        box-shadow: 0 20px 50px -20px rgba(177, 74, 138, 0.35);
      }

      .logo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin: 0 auto 14px;
        background: linear-gradient(135deg, #ff8ec7, #c084fc);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 36px;
        letter-spacing: 1px;
        box-shadow: 0 12px 28px -10px rgba(192, 132, 252, 0.6);
        border: 3px solid rgba(255,255,255,0.85);
      }

      h1 {
        margin: 6px 0 4px;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        color: #4a1d52;
        letter-spacing: 0.5px;
      }

      .subtitle {
        text-align: center;
        font-size: 14px;
        color: #6b4a72;
        margin: 0 0 22px;
        font-weight: 600;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .link {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 0 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.9);
        text-decoration: none;
        color: #3a1f45;
        font-weight: 700;
        font-size: 17px;
        box-shadow: 0 6px 18px -8px rgba(74, 29, 82, 0.25);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .link:active {
        transform: scale(0.97);
        box-shadow: 0 3px 10px -6px rgba(74, 29, 82, 0.3);
      }
      @media (hover: hover) {
        .link:hover {
          background: #ffffff;
          transform: translateY(-1px);
        }
      }

      .icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #fff;
        flex-shrink: 0;
      }
      .ic-map      { background: linear-gradient(135deg, #ef4444, #f97316); }
      .ic-whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
      .ic-instagram{ background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af); }
      .ic-facebook { background: linear-gradient(135deg, #1877f2, #0a4fb5); }
      .ic-telegram { background: linear-gradient(135deg, #29b6f6, #0277bd); }
      .ic-tiktok   { background: linear-gradient(135deg, #000000, #25f4ee 70%, #fe2c55); }

      .label { flex: 1; }
      .arrow {
        font-size: 18px;
        color: #a78bbf;
        transition: transform 0.15s ease;
      }
      .link:active .arrow { transform: translateX(-3px); }

      footer {
        text-align: center;
        font-size: 12px;
        color: #7a5b82;
        margin-top: 22px;
        font-weight: 600;
      }

      @media (max-width: 360px) {
        h1 { font-size: 23px; }
        .link { font-size: 16px; min-height: 54px; }
        .icon { width: 36px; height: 36px; font-size: 18px; }
      }
    </style>
